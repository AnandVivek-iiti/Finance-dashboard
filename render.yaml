services:
  # ---- Backend: Node/Express API + Python (pdfplumber) for PDF parsing ----
  - type: web
    name: finance-dashboard-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && pip install -r scripts/requirements.txt --break-system-packages
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_BIN
        value: python
      - key: MONGO_URI
        sync: false        # set manually in Render dashboard (Atlas connection string)
      - key: FRONTEND_URL
        sync: false        # set to the frontend's Render URL after it's created

  # ---- Frontend: React (Vite) static build ----
  - type: web
    name: finance-dashboard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false        # set to https://<your-backend>.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html